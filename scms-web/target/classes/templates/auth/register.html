<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Register | SCMS</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <span style="font-size:36px;">🍽️</span>
      <h1>Create Account</h1>
      <p>Join Smart Canteen</p>
    </div>

    <div th:if="${error}"   class="alert alert-error"   style="margin-bottom:16px;"><i class="fa fa-circle-xmark"></i> <span th:text="${error}"></span></div>
    <div th:if="${success}" class="alert alert-success" style="margin-bottom:16px;"><i class="fa fa-circle-check"></i> <span th:text="${success}"></span></div>

    <form th:action="@{/register}" method="post">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon"><i class="fa fa-user"></i><input type="text" name="name" placeholder="Your full name" required/></div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-icon"><i class="fa fa-envelope"></i><input type="email" name="email" placeholder="you@email.com" required/></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon"><i class="fa fa-lock"></i><input type="password" name="password" placeholder="Min 6 characters" required minlength="6"/></div>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role" class="form-select">
          <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full"><i class="fa fa-user-plus"></i> Create Account</button>
    </form>
    <div class="auth-footer">Already have an account? <a th:href="@{/login}">Sign in</a></div>
  </div>
</div>
</body>
</html>
