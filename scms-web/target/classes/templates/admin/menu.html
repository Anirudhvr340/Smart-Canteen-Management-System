<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{this :: content}, 'Menu Management')}">
<body>
<div th:fragment="content">

  <div class="card-header-standalone">
    <h2>Menu Items</h2>
    <button class="btn btn-primary" onclick="openModal('addItemModal')">
      <i class="fa fa-plus"></i> Add Item
    </button>
  </div>

  <div class="table-wrap card">
    <table>
      <thead>
        <tr><th>#</th><th>Name</th><th>Category</th><th>Price</th><th>Prep</th><th>Calories</th><th>Tags</th><th>Rating</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.id}"></td>
          <td>
            <div class="item-name-cell" th:text="${item.name}"></div>
            <div class="item-desc-cell" th:text="${item.description}"></div>
          </td>
          <td><span class="badge badge-info" th:text="${item.category}"></span></td>
          <td>₹<span th:text="${item.price}"></span></td>
          <td th:text="${item.prepTimeMinutes + ' min'}"></td>
          <td th:text="${item.caloriesPerServing != null ? item.caloriesPerServing + ' kcal' : '-'}"></td>
          <td>
            <span th:each="tag : ${item.dietaryTags != null ? item.dietaryTags.split(',') : {}}"
                  class="badge badge-success" style="margin:1px;" th:text="${tag}"></span>
            <span th:if="${item.dietaryTags == null or item.dietaryTags.isBlank()}">-</span>
          </td>
          <td>
            <span th:if="${item.totalRatings > 0}">
              ⭐ <span th:text="${#numbers.formatDecimal(item.averageRating,1,1)}"></span>
              (<span th:text="${item.totalRatings}"></span>)
            </span>
            <span th:if="${item.totalRatings == 0}">No ratings</span>
          </td>
          <td>
            <span th:if="${item.available}" class="badge badge-success">Available</span>
            <span th:if="${!item.available}" class="badge badge-danger">Unavailable</span>
          </td>
          <td class="actions-cell">
            <form th:action="@{/admin/menu/{id}/toggle(id=${item.id})}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-sm btn-outline"
                      th:title="${item.available ? 'Disable' : 'Enable'}">
                <i th:class="${item.available ? 'fa fa-eye-slash' : 'fa fa-eye'}"></i>
              </button>
            </form>
            <button class="btn btn-sm btn-outline"
                    th:onclick="'openIngredientModal(' + ${item.id} + ', \'' + ${item.name} + '\')'">
              <i class="fa fa-link"></i>
            </button>
            <form th:action="@{/admin/menu/{id}/delete(id=${item.id})}" method="post" style="display:inline;"
                  onsubmit="return confirm('Delete this item?')">
              <button type="submit" class="btn btn-sm btn-danger"><i class="fa fa-trash"></i></button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="10" class="empty-cell">No menu items yet.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Add Item Modal -->
  <div id="addItemModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><h3>Add Menu Item</h3><button onclick="closeModal('addItemModal')" class="modal-close">&times;</button></div>
      <form th:action="@{/admin/menu/add}" method="post">
        <div class="form-row">
          <div class="form-group"><label>Name *</label><input type="text" name="name" required/></div>
          <div class="form-group"><label>Category *</label>
            <select name="category" class="form-select">
              <option>Main Course</option><option>Starters</option>
              <option>Snacks</option><option>Beverages</option><option>Desserts</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Description</label><input type="text" name="description"/></div>
        <div class="form-row">
          <div class="form-group"><label>Price (₹) *</label><input type="number" name="price" step="0.01" min="1" required/></div>
          <div class="form-group"><label>Prep Time (min) *</label><input type="number" name="prepTimeMinutes" min="1" required/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Calories</label><input type="number" name="caloriesPerServing" min="0"/></div>
          <div class="form-group"><label>Dietary Tags (comma-sep)</label><input type="text" name="dietaryTags" placeholder="VEG,GLUTEN_FREE"/></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('addItemModal')">Cancel</button>
          <button type="submit" class="btn btn-primary"><i class="fa fa-plus"></i> Add Item</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Link Ingredient Modal -->
  <div id="ingredientModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><h3>Map Ingredient to <span id="modalItemName"></span></h3><button onclick="closeModal('ingredientModal')" class="modal-close">&times;</button></div>
      <form id="ingredientForm" method="post">
        <div class="form-group">
          <label>Ingredient</label>
          <select name="ingredientId" class="form-select">
            <option th:each="ing : ${ingredients}" th:value="${ing.id}"
                    th:text="${ing.name + ' (' + ing.unit + ')'}"></option>
          </select>
        </div>
        <div class="form-group"><label>Quantity per serving</label><input type="number" name="quantity" step="0.01" min="0.01" required/></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('ingredientModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Map Ingredient</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openIngredientModal(itemId, itemName) {
      document.getElementById('modalItemName').textContent = itemName;
      document.getElementById('ingredientForm').action = '/admin/menu/' + itemId + '/ingredient';
      openModal('ingredientModal');
    }
  </script>
</div>
</body>
</html>
