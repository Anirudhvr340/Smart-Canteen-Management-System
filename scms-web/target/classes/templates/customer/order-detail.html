<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{this :: content}, 'Order Details')}">
<body>
<div th:fragment="content">
  <a th:href="@{/customer/orders}" class="btn btn-outline" style="margin-bottom:16px;"><i class="fa fa-arrow-left"></i> Back to Orders</a>

  <div class="row-2">
    <div class="card">
      <div class="card-header"><h2>Order #<span th:text="${order.id}"></span></h2>
        <span class="badge" th:classappend="'badge-' + ${order.status.name().toLowerCase()}" th:text="${order.status}"></span>
      </div>

      <!-- Status tracker -->
      <div class="status-tracker">
        <div th:each="s : ${ {'CONFIRMED','PREPARING','READY','COMPLETED'} }" class="status-step"
             th:classappend="${order.status.name() == s or (order.status.name() == 'COMPLETED' and (s == 'CONFIRMED' or s == 'PREPARING' or s == 'READY')) or (order.status.name() == 'READY' and (s == 'CONFIRMED' or s == 'PREPARING')) or (order.status.name() == 'PREPARING' and s == 'CONFIRMED') ? ' done' : ''}">
          <div class="step-dot"></div>
          <div class="step-label" th:text="${s}"></div>
        </div>
      </div>

      <!-- Items -->
      <table style="margin-top:16px;">
        <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
        <tbody>
          <tr th:each="oi : ${order.items}">
            <td>
              <div th:text="${oi.menuItem.name}"></div>
              <div th:if="${oi.specialInstructions != null}" style="font-size:12px;color:#64748b;" th:text="'Note: ' + ${oi.specialInstructions}"></div>
            </td>
            <td th:text="${oi.quantity}"></td>
            <td th:text="'₹' + ${oi.priceAtOrder}"></td>
            <td th:text="'₹' + ${#numbers.formatDecimal(oi.subtotal,1,2)}"></td>
          </tr>
        </tbody>
      </table>
      <div class="order-summary-box">
        <div class="summary-row"><span>Subtotal</span><span>₹<span th:text="${#numbers.formatDecimal(order.rawTotal,1,2)}"></span></span></div>
        <div class="summary-row" th:if="${order.discountApplied > 0}">
          <span>Discount (<span th:text="${order.couponCode}"></span>)</span>
          <span style="color:#22c55e;">-₹<span th:text="${#numbers.formatDecimal(order.discountApplied,1,2)}"></span></span>
        </div>
        <div class="summary-row summary-total"><span>Total</span><span>₹<span th:text="${#numbers.formatDecimal(order.finalTotal,1,2)}"></span></span></div>
        <div class="summary-row"><span>Payment</span><span th:text="${order.paymentMethod}"></span></div>
      </div>
    </div>

    <!-- Feedback -->
    <div class="card" th:if="${order.status.name() == 'COMPLETED'}">
      <div class="card-header"><h2>Rate Your Order</h2></div>
      <form th:action="@{/customer/feedback}" method="post">
        <input type="hidden" name="orderId" th:value="${order.id}"/>
        <div class="form-group">
          <label>Item (optional)</label>
          <select name="menuItemId" class="form-select">
            <option value="">Overall order</option>
            <option th:each="oi : ${order.items}" th:value="${oi.menuItem.id}" th:text="${oi.menuItem.name}"></option>
          </select>
        </div>
        <div class="form-group">
          <label>Rating</label>
          <div class="star-rating">
            <input type="radio" name="rating" value="5" id="s5"/><label for="s5">★</label>
            <input type="radio" name="rating" value="4" id="s4"/><label for="s4">★</label>
            <input type="radio" name="rating" value="3" id="s3"/><label for="s3">★</label>
            <input type="radio" name="rating" value="2" id="s2"/><label for="s2">★</label>
            <input type="radio" name="rating" value="1" id="s1"/><label for="s1">★</label>
          </div>
        </div>
        <div class="form-group">
          <label>Comment</label>
          <textarea name="comment" rows="3" placeholder="Tell us about your experience..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full"><i class="fa fa-paper-plane"></i> Submit Feedback</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
