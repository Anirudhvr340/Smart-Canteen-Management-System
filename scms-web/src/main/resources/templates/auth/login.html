<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Login | SCMS</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <span style="font-size:36px;">🍽️</span>
      <h1>Smart Canteen</h1>
      <p>Management System</p>
    </div>

    <div th:if="${error}" class="alert alert-error" style="margin-bottom:16px;">
      <i class="fa fa-circle-xmark"></i> <span th:text="${error}"></span>
    </div>
    <div th:if="${msg}" class="alert alert-success" style="margin-bottom:16px;">
      <i class="fa fa-circle-check"></i> <span th:text="${msg}"></span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fa fa-envelope"></i>
          <input type="email" name="username" placeholder="you@scms.com" required autofocus/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <i class="fa fa-lock"></i>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fa fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a th:href="@{/register}">Register here</a>
    </div>

    <div class="demo-creds">
      <div class="demo-title">Demo Credentials</div>
      <div class="demo-grid">
        <div class="demo-item"><b>Admin</b><br/>admin@scms.com / admin123</div>
        <div class="demo-item"><b>Staff</b><br/>staff@scms.com / staff123</div>
        <div class="demo-item"><b>Inventory</b><br/>stock@scms.com / stock123</div>
        <div class="demo-item"><b>Customer</b><br/>arjun@scms.com / pass123</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
